[project]
name = "sky-player"
version = "0.1.0"
description = "Sky Music Player"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "prompt-toolkit>=3.0.52",
    "pyinstaller>=6.0.0",
    "rapidfuzz>=3.14.5",
    "textual>=8.2.7",
]

[build-system]
requires = ["setuptools>=61.0.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = {"" = "src"}
py-modules = ["main", "songs", "ui", "inputs", "scheduler", "build_app"]

[dependency-groups]
dev = [
    "pytest-textual-snapshot>=1.1.0",
    "soundcard>=0.4.6",
]

[project.scripts]
play = "main:main"
build-app = "build_app:main"
