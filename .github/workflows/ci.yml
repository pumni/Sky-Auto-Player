name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_COLOR: "1"

defaults:
  run:
    shell: pwsh

jobs:
  validate:
    name: Sky Auto Player — full altitude gate
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Pin uv cache to workspace volume
        run: |
          New-Item -ItemType File -Force -Path .env | Out-Null
          Copy-Item -Force .env.example .env

      - name: Sync deps
        run: uv sync --frozen

      - name: Runtime audit — free-threaded readiness
        run: uv run --env-file .env python scripts/audit_free_threaded_wheels.py

      - name: Lint — ruff
        run: uv run ruff check .

      - name: Types — pyright
        run: uv run pyright

      - name: Security — AGENTS.md P0 audit
        run: uv run --env-file .env python scripts/audit_security_mandates.py

      - name: Parse installer/updater.ps1 on Windows PowerShell 5.1
        shell: powershell
        run: |
          # ``updater.bat`` falls back to ``powershell.exe`` (Windows PowerShell
          # 5.1) when ``pwsh`` is not installed on the user's machine.  PS 5.1
          # reads no-BOM ``.ps1`` files with the system ANSI codepage
          # (Windows-1252 on en-US hosts), so non-ASCII bytes (em-dash ``--``,
          # ``§``) get decoded as ``â€“`` / ``Â§`` and break the parser.  This
          # step fails-fast if the file cannot be parsed by PS 5.1, preventing
          # a regression of the bug that closed 2.4.1 (file carried non-ASCII
          # comments without a UTF-8 BOM, broke external updates on any install
          # without PS7).  Runs on the GitHub Windows runner which always has
          # PS 5.1 available side-by-side with pwsh.
          $errs = $null; $tokens = $null
          $null = [System.Management.Automation.Language.Parser]::ParseFile(
            "$PWD\installer\updater.ps1", [ref]$tokens, [ref]$errs)
          if ($errs -and $errs.Count -gt 0) {
            Write-Host "::error::installer/updater.ps1 fails to parse on Windows PowerShell 5.1 ($($errs.Count) error(s)). updater.bat falls back to PS 5.1 when pwsh is absent; the external update path is broken. Likely cause: file lacks UTF-8 BOM and contains non-ASCII characters decoded wrong by the system ANSI codepage."
            $errs | ForEach-Object {
              Write-Host ("  line {0} col {1}: {2}" -f $_.Extent.StartLineNumber, $_.Extent.StartColumnNumber, $_.Message)
            }
            exit 1
          }
          Write-Host "PS 5.1 parse OK — external updater remains compatible with updater.bat's PS 5.1 fallback."

      - name: Tests — unit (scheduler, parser, domain — no Windows required)
        run: uv run pytest -m "not windows and not slow"