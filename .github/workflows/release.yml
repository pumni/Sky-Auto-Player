name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write
  attestations: write

defaults:
  run:
    shell: pwsh

env:
  FORCE_COLOR: "1"

jobs:
  release:
    name: Build + attest + publish
    runs-on: windows-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Materialize .env
        run: |
          New-Item -ItemType File -Force -Path .env | Out-Null
          Copy-Item -Force .env.example .env

      - name: Sync deps (frozen)
        run: uv sync --frozen

      - name: Runtime audit — free-threaded readiness
        run: uv run --env-file .env python scripts/audit_free_threaded_wheels.py

      - name: Lint — ruff
        run: uv run ruff check .

      - name: Types — pyright
        run: uv run pyright

      - name: Security — AGENTS.md P0 audit
        run: uv run --env-file .env python scripts/audit_security_mandates.py

      - name: Tests — full
        run: uv run pytest

      - name: Pester — installer/updater.ps1 tests
        run: |
          # Pester 5.x is required — the test file uses `BeforeAll`/`AfterAll`
          # at the top of a wrapper Describe block, and root-level setup is
          # deprecated in Pester 6. Pin to 5.x to keep the syntax compatible.
          Install-Module Pester -MinimumVersion 5.0 -MaximumVersion 5.99 `
            -Force -Scope CurrentUser -SkipPublisherCheck -AcceptLicense
          Import-Module Pester -MinimumVersion 5.0 -MaximumVersion 5.99 -ErrorAction Stop
          $r = Invoke-Pester -Path .\installer\Tests\updater.Tests.ps1 -PassThru
          if ($r.FailedCount -gt 0) {
            Write-Host "::error::Pester failed: $($r.FailedCount) of $($r.TotalCount) tests"
            $r.Tests | Where-Object { $_.Result -ne 'Passed' } | ForEach-Object {
              Write-Host ("  - " + $_.Path + " :: " + $_.ErrorRecord.Exception.Message)
            }
            exit 1
          }
          Write-Host "Pester OK: $($r.PassedCount)/$($r.TotalCount) tests passed"

      - name: Parse installer/updater.ps1 on Windows PowerShell 5.1
        shell: powershell
        run: |
          # ``updater.bat`` falls back to ``powershell.exe`` (Windows PowerShell
          # 5.1) when ``pwsh`` is not installed on the user's machine.  PS 5.1
          # reads no-BOM ``.ps1`` files with the system ANSI codepage
          # (Windows-1252 on en-US hosts), so non-ASCII bytes (em-dash ``--``,
          # ``§``) get decoded as ``â€“`` / ``Â§`` and break the parser.  This
          # step fails-fast if the file cannot be parsed by PS 5.1, preventing
          # a regression of the bug that closed 2.4.1 (file carried non-ASCII
          # comments without a UTF-8 BOM, broke external updates on installs
          # without PS7).  Runs on the GitHub Windows runner which always has
          # PS 5.1 available side-by-side with pwsh.
          $errs = $null; $tokens = $null
          $null = [System.Management.Automation.Language.Parser]::ParseFile(
            "$PWD\installer\updater.ps1", [ref]$tokens, [ref]$errs)
          if ($errs -and $errs.Count -gt 0) {
            Write-Host "::error::installer/updater.ps1 fails to parse on Windows PowerShell 5.1 ($($errs.Count) error(s)). updater.bat falls back to PS 5.1 when pwsh is absent; the external update path is broken. Likely cause: file lacks UTF-8 BOM and contains non-ASCII characters decoded wrong by the system ANSI codepage."
            $errs | ForEach-Object {
              Write-Host ("  line {0} col {1}: {2}" -f $_.Extent.StartLineNumber, $_.Extent.StartColumnPosition, $_.Message)
            }
            exit 1
          }
          Write-Host "PS 5.1 parse OK — external updater remains compatible with updater.bat's PS 5.1 fallback."

      - name: Rust wheel precheck (only when rust/ exists)
        run: |
          if (Test-Path rust) {
            uv run --env-file .env python scripts/build_rust_wheel.py
          } else {
            Write-Host "rust/ absent — skipping rust precheck (no-op per AGENTS.md §Build Environment)."
          }

      - name: Assert tag version equals pyproject.toml
        id: verlock
        run: |
          $tag = $env:GITHUB_REF_NAME
          if ($tag -notmatch '^v(.+)$') { throw "Tag must look like vX.Y.Z[-suffix], got: $tag" }
          $tagVer = $Matches[1]
          $pyVer = uv run python -c "import tomllib,pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text(encoding='utf-8'))['project']['version'])"
          if ($tagVer -ne $pyVer) {
            throw "I18 fail: tag version '$tagVer' != pyproject version '$pyVer'. Bump pyproject.toml before tagging."
          }
          Write-Host "Version lock OK: $tagVer"
          # Compute prerelease flag using the SAME PEP 440 parser the in-app
          # update checker uses (sky_music.domain.update_checker imports
          # packaging.version.Version), so the GitHub Release's prerelease
          # bit agrees with `is_prerelease` in src/sky_music/domain/
          # update_checker.py. The previous substring match
          # (`contains(github.ref_name, '-rc') || contains('-beta')`)
          # missed `-alpha` / `-dev` / `-a` / `-b` — packaging would have
          # flagged those as prerelease, so they would have been silently
          # promoted to stable channel via /releases/latest and picked up
          # by the external updater's stable selector.
          $isPre = uv run python -c "from packaging.version import Version; print('true' if Version('$tagVer').is_prerelease else 'false')"
          Write-Host "is_prerelease: $isPre"
          "version=$tagVer"       | Set-Content $env:GITHUB_OUTPUT -Encoding ASCII
          # `Add-Content` (not `Set-Content -Append`) — `Set-Content` has no
          # `-Append` parameter in PowerShell 7; the previous form failed the
          # v2.4.0 release run (29657111725) at this step.
          "is_prerelease=$isPre"  | Add-Content $env:GITHUB_OUTPUT -Encoding ASCII

      - name: Build + manifest + smoke test
        run: uv run --env-file .env python -m build_app --manifest

      - name: Stage release assets
        id: stage
        run: |
          $ver = "${{ steps.verlock.outputs.version }}"
          $rel = "dist\Sky-Auto-Player-v$ver"
          if (-not (Test-Path $rel)) { throw "Missing release dir: $rel" }
          Compress-Archive -Path (Join-Path $rel '*') -DestinationPath "$env:RUNNER_TEMP\Sky-Auto-Player-v$ver.zip" -Force
          $h = (Get-FileHash -Algorithm SHA256 "$env:RUNNER_TEMP\Sky-Auto-Player-v$ver.zip").Hash
          "$h  Sky-Auto-Player-v$ver.zip" | Set-Content "$env:RUNNER_TEMP\Sky-Auto-Player-v$ver.zip.sha256" -Encoding ASCII
          Copy-Item "$rel\MANIFEST.json" "$env:RUNNER_TEMP\MANIFEST.json"
          "version=$ver" | Set-Content $env:GITHUB_OUTPUT -Encoding ASCII

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            ${{ runner.temp }}/Sky-Auto-Player-v${{ steps.stage.outputs.version }}.zip
            ${{ runner.temp }}/Sky-Auto-Player-v${{ steps.stage.outputs.version }}.zip.sha256
            ${{ runner.temp }}/MANIFEST.json

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ runner.temp }}/Sky-Auto-Player-v${{ steps.stage.outputs.version }}.zip
            ${{ runner.temp }}/Sky-Auto-Player-v${{ steps.stage.outputs.version }}.zip.sha256
            ${{ runner.temp }}/MANIFEST.json
          generate_release_notes: true
          draft: false
          prerelease: ${{ steps.verlock.outputs.is_prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
