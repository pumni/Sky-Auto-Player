# Sky Player — local pre-commit config
# Mirrors the CI altitude table (`AGENTS.md` §Validation) so the same checks
# gate commits locally. CI still runs the full suite; this file only front-loads
# the fast feedback.

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
        pass_filenames: false

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        pass_filenames: false

      - id: pyright
        name: pyright
        entry: uv run pyright
        language: system
        types_or: [python, pyi]
        pass_filenames: false

      - id: audit-free-threaded
        name: free-threaded wheel audit
        entry: uv run --env-file .env python scripts/audit_free_threaded_wheels.py
        language: system
        pass_filenames: false

      - id: audit-security-p0
        name: AGENTS.md P0 security audit
        entry: uv run --env-file .env python scripts/audit_security_mandates.py
        language: system
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: trailing-whitespace
